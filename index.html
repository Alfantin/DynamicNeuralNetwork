<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dinamik XOR Neural Network</title>
  <link rel="stylesheet" href="./assets/css/styles.css" />
</head>
<body>
  <div class="wrap">
    <div class="grid">
      <div class="panel">
        <div class="section">
          <h2>Kontroller</h2>
          <div class="buttons">
            <button id="autoBtn">Baslat</button>
            <button id="stopBtn" class="secondary hidden-control">Durdur</button>
            <button id="resetBtn" class="warn">Sifirla</button>
          </div>
          <div class="control-grid">
            <label class="field">
              <span>Oto durdur epoch</span>
              <input id="autoStopEpochInput" type="number" min="50" step="50" value="1000" />
            </label>
            <label class="field">
              <span>Loss durma esigi</span>
              <input id="stopLossThresholdInput" type="number" min="0" max="1" step="0.001" value="0.008" />
            </label>
            <label class="field">
              <span>Buyume baslangici</span>
              <input id="growthStartEpochInput" type="number" min="40" step="10" value="120" />
            </label>
            <label class="field">
              <span>Bolunme esigi</span>
              <input id="splitThresholdInput" type="number" min="0" max="0.05" step="0.0005" value="0.0015" />
            </label>
            <label class="field">
              <span>Budama araligi</span>
              <input id="pruneIntervalInput" type="number" min="20" step="10" value="80" />
            </label>
            <label class="field">
              <span>Temel budama esigi</span>
              <input id="pruneThresholdInput" type="number" min="0.001" max="0.05" step="0.001" value="0.010" />
            </label>
          </div>
        </div>

        <div class="section">
          <h2>Durum</h2>
          <div class="stats">
            <div class="stat"><div class="label">Epoch</div><div id="epochVal" class="value">0</div></div>
            <div class="stat"><div class="label">Loss</div><div id="lossVal" class="value">-</div></div>
            <div class="stat"><div class="label">Hidden Node</div><div id="hiddenVal" class="value">0</div></div>
            <div class="stat"><div class="label">Aktif Baglanti</div><div id="edgeVal" class="value">0</div></div>
            <div class="stat"><div class="label">Buyume Sayisi</div><div id="growVal" class="value">0</div></div>
            <div class="stat"><div class="label">Budama Sayisi</div><div id="pruneVal" class="value">0</div></div>
          </div>
        </div>

        <div class="section">
          <h2>XOR Test Sonuclari</h2>
          <table>
            <thead>
              <tr><th>Input</th><th>Tahmin</th><th>Beklenen</th></tr>
            </thead>
            <tbody id="resultBody"></tbody>
          </table>
        </div>
      </div>

      <div class="panel">
        <canvas id="graphCanvas" width="900" height="680"></canvas>
        <div class="section right-legend">
          <h2>Renkler</h2>
          <div class="legend">
            <span><i class="dot" style="background: var(--input)"></i>Input</span>
            <span><i class="dot" style="background: var(--bias)"></i>Bias</span>
            <span><i class="dot" style="background: var(--hidden)"></i>Hidden</span>
            <span><i class="dot" style="background: var(--output)"></i>Output</span>
          </div>
          <div class="small" style="margin-top:10px;">
            Baglanti kalinligi agirligin mutlak degerini, renk ise isaretini gosterir: <b>mavi = pozitif</b>, <b>kirmizi = negatif</b>.
          </div>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="./src/js/main.js"></script>
</body>
</html>
